services:
  client:
    build:
      context: ./modules/client
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ./modules/client:/app
      - /app/node_modules
    env_file:
      - ./modules/client/.env.local
    environment:
      # Override API URL to use Docker service name (for server-side proxy)
      NEXT_PUBLIC_API_URL: http://agent:8000
      # WebSocket URL for browser (must be accessible from host)
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
      # SSE URL for browser (direct to backend, bypasses Next.js proxy buffering)
      NEXT_PUBLIC_SSE_URL: http://localhost:8000
      # Postgres connection for local dev (when USE_LOCAL_POSTGRES=true)
      POSTGRES_HOST: app-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${COMPOSE_PROJECT_NAME:-pina-colada}
      # Enable polling for hot-reload in Docker
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    depends_on:
      app-postgres:
        condition: service_healthy
      agent:
        condition: service_healthy
    command: ["node", "node_modules/.bin/next", "dev", "-p", "3001"]
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  agent:
    build:
      context: ./modules/agent
      dockerfile: Dockerfile.dev
      target: dev
    volumes:
      - ./modules/agent:/app
      - ./storage:/storage  # Shared storage volume
      - go_mod_cache:/go/pkg/mod  # Cache Go modules between restarts
    env_file:
      - ./modules/agent/.env
    environment:
      - PORT=8000
      - ENV=development
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@app-postgres:5432/${COMPOSE_PROJECT_NAME:-pina-colada}?sslmode=disable
      - STORAGE_PATH=/storage  # Use shared storage path
    ports:
      - "8000:8000"
    depends_on:
      app-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30m
      timeout: 5s
      retries: 10
      start_period: 60s
      start_interval: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app-postgres:
    image: pgvector/pgvector:pg17
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres} # CHANGEME
      POSTGRES_DB: ${COMPOSE_PROJECT_NAME:-pina-colada}
      TZ: UTC
      PGTZ: UTC
    ports:
      - 127.0.0.1:5432:5432
    volumes:
      - app_postgres_data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # App-only Postgres instance (pina-colada database)

volumes:
  app_postgres_data:
    name: ${COMPOSE_PROJECT_NAME}_app_postgres_data
    driver: local
  go_mod_cache:
    name: ${COMPOSE_PROJECT_NAME}_go_mod_cache
    driver: local
